Identified missing workflow folder and devised web-based solution
Identified missing workflow folder and devised web-based solution
Bijna daar — de map src/main en pom.xml staan nu goed op de juiste plek. Er ontbreekt alleen nog de map .github met de bouw-instructie erin. Dat komt omdat mappen die met een punt beginnen vaak onzichtbaar zijn in je bestandsverkenner (macOS/Finder verbergt ze standaard), waardoor hij niet meeging bij het slepen.

Geen probleem — dat bestand maken we gewoon direct in de browser aan, dan hoef je niks te slepen.

Stap 1 — Nieuw bestand aanmaken

Klik op de groene knop Add file (rechtsboven de bestandenlijst) → Create new file.
Er verschijnt een tekstvak boven de editor waar je een bestandsnaam typt. Typ hier precies dit (met de slashes erin — GitHub maakt daar automatisch de mapjes van):
.github/workflows/build.yml
Stap 2 — Inhoud plakken
Plak in het grote tekstvak eronder precies dit:

yaml
name: Build plugin jar

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build met Maven
        run: mvn -B clean package

      - name: Upload jar als download
        uses: actions/upload-artifact@v4
        with:
          name: MinetopiaPlugin
          path: target/MinetopiaPlugin.jar
