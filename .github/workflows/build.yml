name: Build plugin jar
on:
  push:
    branches: [main, master]
  workflow_dispatch: {}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build met Maven
        run: mvn -B clean package
      - name: Upload jar als download
        uses: actions/upload-artifact@v4
        with:
          name: MinetopiaPlugin
          path: target/MinetopiaPlugin.jar
